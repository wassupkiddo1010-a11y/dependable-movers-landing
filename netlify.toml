# Production site = static index.html (not the Next.js app in /app).
#
# If deploys fail with "Plugin Error", remove @netlify/plugin-nextjs:
# Netlify → Site configuration → Build & deploy → Build plugins → Remove Next.js

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NPM_FLAGS = "--omit=dev"
